name: Check and Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install-ubuntu
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install-windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check -d --target all

      - name: moon fmt --deny-warn
        run: |
          # Compatible with the current MoonBit toolchain; this enforces the no-format-drift gate.
          moon fmt --check

      - name: moon info --deny-warn
        run: |
          # Compatible with the current MoonBit toolchain; this regenerates interfaces and fails on drift.
          moon info --target all
          git diff --exit-code

      - name: moon test
        run: moon test -d --target all
