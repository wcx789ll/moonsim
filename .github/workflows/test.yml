name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    name: Check & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js (required for JS target tests)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MoonBit toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify toolchain and update dependencies
        run: |
          moon version --all
          moon update

      # ── Format gate ──────────────────────────────────────────────────────────
      # Fail if any file needs reformatting (equivalent to moon fmt --deny-warn).
      - name: moon fmt --deny-warn
        run: moon fmt --check

      # ── Type-check all compilation targets ───────────────────────────────────
      - name: moon check --deny-warn
        run: moon check -d --deny-warn --target all

      # ── Interface-file gate ───────────────────────────────────────────────────
      # Regenerate .mbti files and ensure there is no drift in the repository.
      # The .gitattributes in this repo forces LF for all text files, so
      # `git diff --exit-code` is reliable across all operating systems.
      - name: moon info --deny-warn
        run: |
          moon info --target all
          git diff --exit-code

      # ── Test suite ────────────────────────────────────────────────────────────
      - name: moon test
        run: moon test -d --target all
