name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-and-test:
    name: Check, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show MoonBit version
        run: moon version --all

      - name: Install dependencies
        run: moon update

      - name: Check (type-check all packages)
        run: moon check

      - name: Run all tests
        run: moon test

      - name: Format check (moon fmt)
        run: |
          moon fmt
          git diff --exit-code || (echo "Code is not formatted. Please run moon fmt." && exit 1)

      - name: Build all examples
        run: |
          moon build --target wasm-gc
